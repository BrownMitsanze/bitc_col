<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
</head>
<body>
    <div class="row">
        <div class="left_side_bar">
            <h3></h3>
        </div>
        <div class="content">
    <h1>Contact Us</h1>
    <p>This is the contact page of our website.</p>

    <form action="">

        <input type="text" name="" placeholder="Enter your fullname" required><br>
        <input type="email" name="" placeholder="Enter your email" required><br>
        <input type="number" name="" placeholder="Enter your phone number" required><br>
        <input type="password" name="" placeholder="Enter your password" required><br>
        <input type="search" name="" placeholder="Search for something" required><br>
        <input type="file" name="" placeholder="Upload a file" required><br>

        <input type="radio" name="rating" value="1"> 1 <br>
        <input type="radio" name="rating" value="2"> 2 <br>
        <input type="radio" name="rating" value="3"> 3 <br>
        <input type="radio" name="rating" value="4"> 4 <br>
        <input type="radio" name="rating" value="5"> 5 <br>

        <input type="checkbox" name="subscribe" value="yes"> Subscribe to BBIT newsletter<br>
        <input type="checkbox" name="subscribe" value="yes"> Subscribe to BICS newsletter<br>

        <select name="" id="">
            <option value="">Select your country</option>
            <option value="kenya">Kenya</option>
            <option value="uganda">Uganda</option>
            <option value="tanzania">Tanzania</option>
            <option value="rwanda">Rwanda</option>
        </select>
        <br>

        <textarea name="" id="" cols="30" rows="5" placeholder="Enter your message"></textarea>

        <br>

        <input type="submit" value="Upload Details"><br>
        <button type="submit">Submit Details</button>
    </form>
        </div>
        <div class="right_side_bar">
            <h3></h3>
        </div>
</body>
</html>
